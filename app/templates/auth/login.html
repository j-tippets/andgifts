{% extends "base.html" %}
{% block title %}Sign in — Ag{% endblock %}
{% block auth_content %}
<div style="max-width:380px; margin:80px auto; padding:32px; background:var(--paper-raised); border:1px solid var(--line); border-radius:10px;">
  <div class="eyebrow" style="text-align:center; margin-bottom:12px;">
    <img src="https://andgiftscdn.nyc3.cdn.digitaloceanspaces.com/ag_logo_badge.svg" alt="&amp;Gifts" height="100">
  </div>
  <h1 style="margin-bottom:20px;">Welcome back</h1>
  <form method="POST">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <p class="subdued" style="margin:-8px 0 16px; text-align:right;"><a href="{{ url_for('auth.forgot_password') }}"><small>Forgot password?</small></a></p>
    <button class="btn btn-primary" type="submit" style="width:100%;">Sign in</button>
  </form>
  <p class="subdued" style="margin-top:16px;">No account yet? <a href="{{ url_for('auth.register') }}">Create one</a>.</p>
</div>
{% endblock %}
