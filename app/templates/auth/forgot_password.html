{% extends "base.html" %}
{% block title %}Reset your password — Ag{% endblock %}
{% block auth_content %}
<div style="max-width:380px; margin:80px auto; padding:32px; background:var(--paper-raised); border:1px solid var(--line); border-radius:10px;">
  <div class="eyebrow" style="text-align:center; margin-bottom:12px;">
    <img src="https://andgiftscdn.nyc3.cdn.digitaloceanspaces.com/ag_logo_badge.svg" alt="&amp;Gifts" height="100">
  </div>
  <h1 style="margin-bottom:12px;">Forgot your password?</h1>
  <p class="subdued" style="margin-bottom:20px;">Enter your account email and we'll send you a link to reset it.</p>
  <form method="POST">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" required autofocus>
    </div>
    <button class="btn btn-primary" type="submit" style="width:100%;">Send reset link</button>
  </form>
  <p class="subdued" style="margin-top:16px;"><a href="{{ url_for('auth.login') }}">&larr; Back to sign in</a></p>
</div>
{% endblock %}
