{% extends "base.html" %}
{% block title %}Choose a new password — Ag{% endblock %}
{% block auth_content %}
<div style="max-width:380px; margin:80px auto; padding:32px; background:var(--paper-raised); border:1px solid var(--line); border-radius:10px;">
  <div class="eyebrow" style="text-align:center; margin-bottom:12px;">
    <img src="https://andgiftscdn.nyc3.cdn.digitaloceanspaces.com/ag_logo_badge.svg" alt="&amp;Gifts" height="100">
  </div>
  <h1 style="margin-bottom:20px;">Choose a new password</h1>
  <form method="POST">
    <div class="field">
      <label>New password</label>
      <input type="password" name="password" required autofocus>
    </div>
    <div class="field">
      <label>Confirm password</label>
      <input type="password" name="confirm_password" required>
    </div>
    <button class="btn btn-primary" type="submit" style="width:100%;">Reset password</button>
  </form>
</div>
{% endblock %}
