{% extends "base.html" %}
{% block title %}Create account — Ag{% endblock %}
{% block auth_content %}
<div style="max-width:420px; margin:60px auto; padding:32px; background:var(--paper-raised); border:1px solid var(--line); border-radius:10px;">
  <div class="eyebrow">
    <center><img class="mobile-topbar-logo" src="https://andgiftscdn.nyc3.cdn.digitaloceanspaces.com/ag_logo_white.svg" alt="&amp;Gifts" height='100px'></center>
  </div>
  <h1 style="margin-bottom:20px;">Start your free plan</h1>
  <form method="POST">
    <div class="field">
      <label>Your business / brokerage name</label>
      <input type="text" name="org_name" placeholder="e.g. Smith Realty Group" required>
    </div>
    <div class="field-row">
      <div class="field">
        <label>First name</label>
        <input type="text" name="first_name" required>
      </div>
      <div class="field">
        <label>Last name</label>
        <input type="text" name="last_name" required>
      </div>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" required>
    </div>
    <button class="btn btn-primary" type="submit" style="width:100%;">Create free account</button>
  </form>
  <p class="subdued" style="margin-top:16px;">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>.</p>
</div>
{% endblock %}
