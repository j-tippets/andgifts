{% extends "base.html" %}
{% block title %}Checkout cancelled — Ag{% endblock %}
{% block content %}
<div class="empty-state" style="border:1px solid var(--line); border-radius:20px; background:var(--paper-raised);">
  <h3>Checkout cancelled</h3>
  <p>No charge was made. {{ order.gift_name_snapshot }} was not ordered for {{ order.contact.household_name }}.</p>
  <a href="{{ url_for('contacts.browse_gifts', contact_id=order.contact_id) }}" class="btn btn-primary">Try again</a>
  <a href="{{ url_for('contacts.view_contact', contact_id=order.contact_id) }}" class="btn btn-ghost">Back to {{ order.contact.household_name }}</a>
</div>
{% endblock %}
