name: andgifts
region: nyc1

databases:
  - name: andgifts-db
    engine: MYSQL
    version: "8"
    production: false   # flip to true when you're ready to pay for the HA tier

services:
  - name: web
    github:
      repo: YOUR_GITHUB_USERNAME/andgifts
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: pip install -r requirements.txt
    run_command: gunicorn --worker-tmp-dir /dev/shm --workers 2 --bind 0.0.0.0:8080 wsgi:app
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        type: SECRET
      - key: DB_USER
        value: ${andgifts-db.USERNAME}
      - key: DB_PASSWORD
        type: SECRET
        value: ${andgifts-db.PASSWORD}
      - key: DB_HOST
        value: ${andgifts-db.HOSTNAME}
      - key: DB_PORT
        value: ${andgifts-db.PORT}
      - key: DB_NAME
        value: ${andgifts-db.DATABASE}
      - key: STRIPE_SECRET_KEY
        type: SECRET
      - key: SENDGRID_API_KEY
        type: SECRET
      - key: TWILIO_ACCOUNT_SID
        type: SECRET
      - key: TWILIO_AUTH_TOKEN
        type: SECRET
      - key: ANTHROPIC_API_KEY
        type: SECRET

# Nightly job that generates dashboard suggestions for every org.
# This is what makes the daily dashboard feel "waiting for you" each
# morning instead of computing on-demand every page load.
# DO App Platform scheduled (cron) jobs are GA as of late 2025 -- min
# interval is every 15 min. This runs once a day at 5am UTC (~11pm MT).
jobs:
  - name: nightly-suggestions
    github:
      repo: YOUR_GITHUB_USERNAME/andgifts
      branch: main
    source_dir: /
    build_command: pip install -r requirements.txt
    run_command: python jobs/generate_daily_suggestions.py
    kind: SCHEDULED
    schedule:
      cron: "0 5 * * *"
    instance_size_slug: basic-xxs
    envs:
      - key: FLASK_ENV
        value: production
      - key: DB_USER
        value: ${andgifts-db.USERNAME}
      - key: DB_PASSWORD
        type: SECRET
        value: ${andgifts-db.PASSWORD}
      - key: DB_HOST
        value: ${andgifts-db.HOSTNAME}
      - key: DB_PORT
        value: ${andgifts-db.PORT}
      - key: DB_NAME
        value: ${andgifts-db.DATABASE}
